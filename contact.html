<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="./picture/Favicon.png?v=1">

</head>
<body>
  <header>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="project.html">Project</a>
      <a href="resume.html">Resume</a>
      <a href="certificate.html">Certificate</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>
    
  <main>
    <section class="page-header">
      <div class="container" style="max-width: 600px; text-align: left;">
        <h1 style="text-align: center; margin-bottom: 30px;">Contact Me</h1>
        
        <form action="#" method="POST">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Your Email" required>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject" required>
              <option value="" disabled selected>Select a subject...</option>
              <option value="job">Job Opportunity</option>
              <option value="freelance">Freelance Project</option>
              <option value="hello">Just Saying Hello</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" name="message" rows="5" minlength="10" placeholder="Write your message here..." required></textarea>
          </div>

          <div class="form-group">
            <button type="submit">Send Message</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  </footer>
        
</body>
</html>
